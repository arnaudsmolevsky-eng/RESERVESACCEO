<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACCEO - Gestion des Réserves</title>
  
  <!-- CSS Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Map pour ESM -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",

      }

  </script>
  
  <!-- Babel pour lire le JSX -->

</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from "react";
    import { createRoot } from "react-dom/client";

    // --- IMPORT FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
    // Retour à signInWithPopup, plus fiable sur les domaines tiers
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";
    
    // --- IMPORT ICÔNES ---
    import * as Lucide from "lucide-react";
    const { 
      Map, List, FileText, Plus, X, Upload, Camera, 
      CheckCircle, AlertCircle, Clock, MapPin, 
      Filter, Trash2, Menu, User, PenTool, Save, RotateCcw, Loader2, LogIn, ZoomIn, ZoomOut, Settings
    } = Lucide;

    // --- CONFIGURATION FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyBEs5WhGvhy6iWOByBkY4ArsZCBf0Z35mI",
      authDomain: "zero-reserve-acceo.firebaseapp.com",
      projectId: "zero-reserve-acceo",
      storageBucket: "zero-reserve-acceo.firebasestorage.app",
      messagingSenderId: "912126437869",
      appId: "1:912126437869:web:23a1a8a8fef27451299fe4",
      measurementId: "G-ND9X87M1B5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);
    const APP_ID = "zero-reserve-acceo"; 

    // --- CONSTANTES ---
    const LOGO_ACCEO = "acceo_environnement-color.png";
    const STATUS = {
      OPEN: { id: 'OPEN', label: 'Ouvert', color: 'bg-red-500', icon: AlertCircle },
      IN_PROGRESS: { id: 'IN_PROGRESS', label: 'En cours', color: 'bg-orange-500', icon: Clock },
      RESOLVED: { id: 'RESOLVED', label: 'Levé', color: 'bg-green-500', icon: CheckCircle }
    };

    // Données de test si hors-ligne ou non connecté
    const MOCK_DATA = {
      projects: [{ id: 'p1', name: 'Projet Démo', lots: [{id: 'l1', name: 'Plomberie', entreprise: 'Plombier Pro'}] }],
      plans: [],
      reserves: []
    };

    // ==========================================
    // UTILS : COMPRESSION D'IMAGE
    // ==========================================
    const compressImageFile = (file, maxDim = 2000, quality = 0.6) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width > maxDim || height > maxDim) {
              const ratio = Math.min(maxDim / width, maxDim / height);
              width *= ratio;
              height *= ratio;
            }
            const cvs = document.createElement('canvas');
            cvs.width = width;
            cvs.height = height;
            cvs.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(cvs.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    // ==========================================
    // SOUS-COMPOSANT : ÉDITEUR DE PHOTO (DESSIN)
    // ==========================================
    const PhotoEditor = ({ photoUrl, onSave, onClose }) => {
      const canvasRef = useRef(null);
      const ctxRef = useRef(null);
      const originalImageRef = useRef(new Image());
      const [isDrawing, setIsDrawing] = useState(false);
      const [color, setColor] = useState('#ef4444');
      const [lineWidth, setLineWidth] = useState(4);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctxRef.current = ctx;

        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          const maxWidth = window.innerWidth * 0.9;
          const maxHeight = window.innerHeight * 0.7;
          let width = img.width;
          let height = img.height;

          if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
          if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }

          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
        };
        img.src = photoUrl;
        originalImageRef.current.src = photoUrl;
      }, [photoUrl]);

      const getCoordinates = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX;
        let clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        }
        return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
      };

      const startDrawing = (e) => {
        const { x, y } = getCoordinates(e);
        ctxRef.current.beginPath();
        ctxRef.current.moveTo(x, y);
        ctxRef.current.strokeStyle = color;
        ctxRef.current.lineWidth = lineWidth;
        setIsDrawing(true);
      };

      const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const { x, y } = getCoordinates(e);
        ctxRef.current.lineTo(x, y);
        ctxRef.current.stroke();
      };

      const stopDrawing = () => {
        ctxRef.current.closePath();
        setIsDrawing(false);
      };

      const resetCanvas = () => {
        const canvas = canvasRef.current;
        const ctx = ctxRef.current;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(originalImageRef.current, 0, 0, canvas.width, canvas.height);
      };

      return (
        <div className="fixed inset-0 z-50 bg-slate-900/95 flex flex-col items-center justify-center p-4">
          <div className="flex flex-wrap items-center gap-3 mb-4 bg-white p-3 rounded-2xl shadow-2xl">
            <div className="flex gap-2 pr-3 border-r border-slate-200">
              {['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#000000', '#ffffff'].map(c => (
                <button key={c} onClick={() => setColor(c)} className={`w-8 h-8 rounded-full border-2 transition-transform ${color === c ? 'border-slate-800 scale-125' : 'border-slate-200 hover:scale-110'}`} style={{backgroundColor: c}} />
              ))}
            </div>
            <button onClick={resetCanvas} className="p-2 text-slate-500 hover:text-red-500 flex items-center gap-2"><RotateCcw size={18} /></button>
            <button onClick={onClose} className="p-2 text-slate-500 hover:text-slate-800"><X size={20} /></button>
            <button onClick={() => onSave(canvasRef.current.toDataURL('image/jpeg', 0.8))} className="ml-2 px-4 py-2 bg-[#003B5C] text-white rounded-xl font-medium hover:bg-[#002a42] flex items-center gap-2">
              <Save size={18}/> Valider
            </button>
          </div>
          <div className="relative border-4 border-slate-700 rounded-xl overflow-hidden bg-slate-800 touch-none">
            <canvas ref={canvasRef} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} className="cursor-crosshair block" />
          </div>
          <p className="text-white/50 text-sm mt-4">Dessinez sur l'image pour entourer ou pointer le défaut.</p>
        </div>
      );
    };

    // ==========================================
    // COMPOSANT PRINCIPAL
    // ==========================================
    function App() {
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);

      const [projects, setProjects] = useState([]);
      const [plans, setPlans] = useState([]);
      const [reserves, setReserves] = useState([]);

      const [currentProjectId, setCurrentProjectId] = useState(null);
      const [currentPlanId, setCurrentPlanId] = useState(null);
      const [viewMode, setViewMode] = useState('plan');
      const [selectedReserveId, setSelectedReserveId] = useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      
      const [editingPhotoUrl, setEditingPhotoUrl] = useState(null);
      const [isExporting, setIsExporting] = useState(false);
      const [isUploadingPlan, setIsUploadingPlan] = useState(false);
      const [zoomLevel, setZoomLevel] = useState(1);

      const [filterStatus, setFilterStatus] = useState('');
      const [filterLot, setFilterLot] = useState('');

      const [isLotModalOpen, setIsLotModalOpen] = useState(false);
      const [newLotName, setNewLotName] = useState('');
      const [newLotEntreprise, setNewLotEntreprise] = useState('');

      const currentProject = projects.find(p => p.id === currentProjectId);
      const projectPlans = plans.filter(p => p.projectId === currentProjectId);
      const currentPlan = plans.find(p => p.id === currentPlanId);
      const currentPlanReserves = currentPlanId ? reserves.filter(r => r.planId === currentPlanId) : [];
      const selectedReserve = reserves.find(r => r.id === selectedReserveId);

      // --- CONNEXION & SYNCHRONISATION FIREBASE ---
      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (!user || user.uid !== 'mock-user-test') setUser(currentUser);
          setIsAuthLoading(false);
        });
        return () => unsubscribe();
      }, [user]);

      useEffect(() => {
        if (!user) return;
        if (user.uid === 'mock-user-test') {
          setProjects(MOCK_DATA.projects); setPlans(MOCK_DATA.plans); setReserves(MOCK_DATA.reserves);
          if (MOCK_DATA.projects.length > 0) setCurrentProjectId(MOCK_DATA.projects[0].id);
          return;
        }

        // Écoute de la base de données en temps réel (avec gestion d'erreur sécurisée)
        const handleError = (error) => console.warn("Attente de configuration Firestore :", error.message);

        const unsubP = onSnapshot(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'projects'), snap => {
          const proj = snap.docs.map(d => d.data());
          setProjects(proj);
          if (proj.length > 0 && !currentProjectId) setCurrentProjectId(proj[0].id);
        }, handleError);
        const unsubPl = onSnapshot(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'plans'), snap => setPlans(snap.docs.map(d => d.data())), handleError);
        const unsubR = onSnapshot(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'reserves'), snap => setReserves(snap.docs.map(d => d.data())), handleError);

        return () => { unsubP(); unsubPl(); unsubR(); };
      }, [user]);

      const handleGoogleLogin = async () => {
        try { 
          // Utilisation d'un Popup (fenêtre) classique pour la connexion, plus compatible.
          await signInWithPopup(auth, provider); 
        } 
        catch (error) { 
          console.error("Erreur de connexion :", error);
          if (error.code === 'auth/unauthorized-domain') {
             alert(`⚠️ Domaine non autorisé par Firebase.\n\nVous devez ajouter ${window.location.hostname} dans les "Domaines autorisés" des paramètres d'authentification Firebase.\n\nPassage en MODE TEST.`);
             setUser({ uid: 'mock-user-test', displayName: 'Mode Test', email: 'test@acceo.fr', photoURL: null });
          } else if (error.code === 'auth/popup-blocked') {
             alert("⚠️ Votre navigateur a bloqué la fenêtre de connexion Google. Veuillez autoriser les pop-ups pour ce site.");
          } else {
             alert("Erreur lors de la connexion Google: " + error.message);
          }
        }
      };

      const handleLogout = () => {
        if (user && user.uid === 'mock-user-test') setUser(null);
        else signOut(auth);
      };

      // --- HELPERS BASE DE DONNÉES ---
      const saveToDB = async (col, id, data) => {
        if (user && user.uid !== 'mock-user-test') {
          try { await setDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, col, id), data); } 
          catch(e) { console.error(e); alert("Erreur de sauvegarde: Firestore n'est peut-être pas activé ou fichier trop lourd."); }
        }
      };

      const deleteFromDB = async (col, id) => {
        if (user && user.uid !== 'mock-user-test') {
          try { await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, col, id)); } 
          catch(e) {}
        }
      };

      // --- LOGIQUE DE ZOOM TACTILE/MOLETTE ---
      const scrollContainerRef = useRef(null);
      const isPointerDownRef = useRef(false);
      const isDraggingRef = useRef(false);
      const dragStartPosRef = useRef({ x: 0, y: 0 });
      const dragStartScrollRef = useRef({ x: 0, y: 0 });

      useEffect(() => { setZoomLevel(1); }, [currentPlanId]);

      useEffect(() => {
        const container = scrollContainerRef.current;
        if (!container) return;

        const handleWheel = (e) => {
          e.preventDefault();
          const factor = e.deltaY < 0 ? 1.15 : 0.85; 
          setZoomLevel(z => Math.min(Math.max(0.5, z * factor), 20)); 
        };

        let initialPinchDist = null;
        const handleTouchStart = (e) => {
          if (e.touches.length === 2) {
            e.preventDefault();
            initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          }
        };

        const handleTouchMove = (e) => {
          if (e.touches.length === 2) {
            e.preventDefault();
            const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (initialPinchDist) {
              const factor = currentDist / initialPinchDist;
              setZoomLevel(z => Math.min(Math.max(0.5, z * factor), 20));
            }
            initialPinchDist = currentDist;
          }
        };

        const handleTouchEnd = (e) => { if (e.touches.length < 2) initialPinchDist = null; };

        container.addEventListener('wheel', handleWheel, { passive: false });
        container.addEventListener('touchstart', handleTouchStart, { passive: false });
        container.addEventListener('touchmove', handleTouchMove, { passive: false });
        container.addEventListener('touchend', handleTouchEnd);

        return () => {
          container.removeEventListener('wheel', handleWheel);
          container.removeEventListener('touchstart', handleTouchStart);
          container.removeEventListener('touchmove', handleTouchMove);
          container.removeEventListener('touchend', handleTouchEnd);
        };
      }, [viewMode, currentPlanId]);

      const handlePointerDown = (e) => {
        if (e.target.closest('.reserve-pin')) return;
        isPointerDownRef.current = true;
        isDraggingRef.current = false;
        dragStartPosRef.current = { x: e.clientX, y: e.clientY };
        if (scrollContainerRef.current) dragStartScrollRef.current = { x: scrollContainerRef.current.scrollLeft, y: scrollContainerRef.current.scrollTop };
      };

      const handlePointerMove = (e) => {
        if (!isPointerDownRef.current) return;
        if (e.pointerType === 'touch' && !e.isPrimary) return;
        const dx = e.clientX - dragStartPosRef.current.x;
        const dy = e.clientY - dragStartPosRef.current.y;
        
        // Tolérance de mouvement plus élevée sur écran tactile pour ne pas bloquer les clics (tapotements) par erreur
        const threshold = e.pointerType === 'touch' ? 15 : 5;
        
        if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
          isDraggingRef.current = true;
          if (scrollContainerRef.current) {
            scrollContainerRef.current.scrollLeft = dragStartScrollRef.current.x - dx;
            scrollContainerRef.current.scrollTop = dragStartScrollRef.current.y - dy;
          }
        }
      };

      const handlePointerUp = (e) => {
        isPointerDownRef.current = false;
        // On garde l'état de glissement actif quelques millisecondes pour bien bloquer le 'onClick' qui suit immédiatement le relâchement
        setTimeout(() => {
          isDraggingRef.current = false;
        }, 50);
      };

      // --- ACTIONS MÉTIER ---
      const handleCreateProject = () => {
        const projectName = window.prompt("Nom du nouveau projet :");
        if (projectName && projectName.trim() !== '') {
          const newProject = { id: `p_${Date.now()}`, name: projectName.trim(), lots: [] };
          // Mise à jour immédiate (optimiste)
          setProjects(p => [...p, newProject]);
          saveToDB('projects', newProject.id, newProject);
          setCurrentProjectId(newProject.id);
          setCurrentPlanId(null);
        }
      };

      const handleAddLot = () => {
        if (!newLotName || !currentProject) return;
        const newLot = { id: `lot_${Date.now()}`, name: newLotName, entreprise: newLotEntreprise };
        const updatedProject = { ...currentProject, lots: [...(currentProject.lots || []), newLot] };
        
        setProjects(projects.map(p => p.id === updatedProject.id ? updatedProject : p));
        saveToDB('projects', updatedProject.id, updatedProject);
        setNewLotName(''); setNewLotEntreprise('');
      };

      const handleDeleteLot = (lotId) => {
        const updatedProject = { ...currentProject, lots: currentProject.lots.filter(l => l.id !== lotId) };
        setProjects(projects.map(p => p.id === updatedProject.id ? updatedProject : p));
        saveToDB('projects', updatedProject.id, updatedProject);
      };

      const getLotName = (lotId) => currentProject?.lots?.find(l => l.id === lotId)?.name || '-';
      const getLotEntreprise = (lotId) => currentProject?.lots?.find(l => l.id === lotId)?.entreprise || '-';

      const handlePlanUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setIsUploadingPlan(true);
        const newPlanId = `pl_${Date.now()}`;
        const planName = file.name.replace(/\.[^/.]+$/, "");

        try {
          let imageUrl = '';
          if (file.type === 'application/pdf') {
            if (!window.pdfjsLib) {
              await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                script.onload = () => {
                  window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                  resolve();
                };
                script.onerror = reject; document.head.appendChild(script);
              });
            }
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await window.pdfjsLib.getDocument(new Uint8Array(arrayBuffer)).promise;
            const page = await pdf.getPage(1);
            
            const viewport = page.getViewport({ scale: 2.0 });
            const canvas = document.createElement('canvas');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
            
            imageUrl = canvas.toDataURL('image/jpeg', 0.6); 
          } else {
            imageUrl = await compressImageFile(file, 2000, 0.6);
          }
          
          const newPlan = { id: newPlanId, projectId: currentProjectId, name: planName, imageUrl };
          
          setPlans(p => [...p, newPlan]);
          saveToDB('plans', newPlan.id, newPlan);
          setCurrentPlanId(newPlanId);
          
        } catch (error) { alert("Erreur lors de la lecture du fichier."); } 
        finally { setIsUploadingPlan(false); e.target.value = ''; }
      };

      const handleAddPin = (e) => {
        if (isDraggingRef.current || viewMode !== 'plan' || !currentPlan) return;
        
        // Sécurité supplémentaire : s'assurer qu'on ne clique pas sur une interface existante
        if (e.target.closest('.reserve-pin') || e.target.closest('button')) return;

        const rect = e.currentTarget.getBoundingClientRect();
        const newReserve = {
          id: `r_${Date.now()}`, planId: currentPlanId, 
          x: ((e.clientX - rect.left) / rect.width) * 100, 
          y: ((e.clientY - rect.top) / rect.height) * 100,
          status: 'OPEN', lotId: '', description: '', photoUrl: null,
          date: new Date().toISOString().split('T')[0]
        };

        // Affichage immédiat de la pastille
        setReserves(r => [...r, newReserve]);
        saveToDB('reserves', newReserve.id, newReserve);
        setSelectedReserveId(newReserve.id);
      };

      const handleUpdateReserve = (id, updates) => {
        const reserve = reserves.find(r => r.id === id);
        if (!reserve) return;
        const updated = { ...reserve, ...updates };
        
        setReserves(reserves.map(r => r.id === id ? updated : r));
        saveToDB('reserves', id, updated);
      };
      
      const handleDeleteReserve = (id) => {
        if(window.confirm('Supprimer cette réserve ?')) {
          setReserves(reserves.filter(r => r.id !== id));
          deleteFromDB('reserves', id);
          setSelectedReserveId(null);
        }
      };

      const handleExportPDF = async () => {
        if (!currentPlan) return;
        setIsExporting(true);
        try {
          if (!window.html2pdf) {
            await new Promise((res, rej) => {
              const script = document.createElement('script');
              script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
              script.onload = res; script.onerror = rej; document.head.appendChild(script);
            });
          }
          const element = document.getElementById('pdf-export-container');
          element.style.display = 'block';
          const opt = { margin: 10, filename: `Rapport_${currentPlan.name}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
          await window.html2pdf().set(opt).from(element).save();
          element.style.display = 'none';
        } catch (error) { alert("Erreur lors de la génération du PDF."); } 
        finally { setIsExporting(false); }
      };


      // --- RENDU : ÉCRAN DE CONNEXION ---
      if (isAuthLoading) return <div className="min-h-screen flex items-center justify-center bg-slate-100"><Loader2 className="animate-spin text-[#003B5C]" size={48} /></div>;

      if (!user) {
        return (
          <div className="min-h-screen bg-slate-100 flex flex-col justify-center items-center p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
              <img src={LOGO_ACCEO} alt="ACCEO Environnement" className="h-20 mx-auto mb-6 object-contain" />
              <h1 className="text-2xl font-bold text-[#003B5C] mb-2">Gestion des Réserves</h1>
              <p className="text-slate-500 mb-8">Suivi de réserves et annotations</p>
              <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 text-[#003B5C] py-3 px-4 rounded-xl hover:bg-slate-50 font-medium cursor-pointer z-10 relative">
                <LogIn size={20}/> Continuer avec Google
              </button>
            </div>
          </div>
        );
      }

      // --- RENDU : APPLICATION PRINCIPALE ---
      return (
        <div className="font-sans text-slate-800 h-screen w-full flex bg-slate-50 overflow-hidden relative">
          
          {/* MODAL : GESTION DES LOTS */}
          {isLotModalOpen && (
            <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl max-w-md w-full overflow-hidden flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center p-4 border-b border-slate-200">
                  <h3 className="font-bold text-lg text-[#003B5C]">Gérer les lots du projet</h3>
                  <button onClick={() => setIsLotModalOpen(false)} className="p-1 hover:bg-slate-100 rounded-full"><X size={20}/></button>
                </div>
                <div className="p-4 overflow-y-auto flex-1">
                  <div className="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-200">
                    <h4 className="text-sm font-bold mb-3 text-slate-700">Ajouter un nouveau lot</h4>
                    <input type="text" placeholder="Nom du lot (ex: Menuiserie)" value={newLotName} onChange={e=>setNewLotName(e.target.value)} className="w-full border rounded-md p-2 text-sm mb-2" />
                    <input type="text" placeholder="Entreprise associée" value={newLotEntreprise} onChange={e=>setNewLotEntreprise(e.target.value)} className="w-full border rounded-md p-2 text-sm mb-3" />
                    <button onClick={handleAddLot} className="w-full bg-[#003B5C] text-white py-2 rounded-md font-medium hover:bg-[#002a42]">Ajouter</button>
                  </div>
                  
                  <h4 className="text-sm font-bold mb-3 text-slate-700">Lots existants ({currentProject?.lots?.length || 0})</h4>
                  <ul className="divide-y divide-slate-100">
                    {currentProject?.lots?.map(lot => (
                      <li key={lot.id} className="py-3 flex justify-between items-center">
                        <div>
                          <p className="font-bold text-sm text-[#003B5C]">{lot.name}</p>
                          <p className="text-xs text-slate-500">{lot.entreprise || 'Aucune entreprise'}</p>
                        </div>
                        <button onClick={() => handleDeleteLot(lot.id)} className="text-red-400 hover:text-red-600 p-2"><Trash2 size={16}/></button>
                      </li>
                    ))}
                    {(!currentProject?.lots || currentProject.lots.length === 0) && <p className="text-sm text-slate-400 italic">Aucun lot défini pour le moment.</p>}
                  </ul>
                </div>
              </div>
            </div>
          )}

          {/* OVERLAY : DESSIN PHOTO */}
          {editingPhotoUrl && (
            <PhotoEditor photoUrl={editingPhotoUrl} onSave={(base64) => { handleUpdateReserve(selectedReserveId, { photoUrl: base64 }); setEditingPhotoUrl(null); }} onClose={() => setEditingPhotoUrl(null)} />
          )}

          {/* BARRE LATÉRALE */}
          <aside className={`fixed inset-y-0 left-0 z-40 w-72 bg-white border-r border-slate-200 transform transition-transform duration-300 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 flex flex-col`}>
            <div className="h-16 flex items-center px-6 border-b border-slate-200">
              <img src={LOGO_ACCEO} alt="ACCEO" className="h-8 object-contain" />
              <button className="ml-auto md:hidden text-slate-500" onClick={() => setIsSidebarOpen(false)}><X size={24} /></button>
            </div>

            <div className="flex-1 overflow-y-auto p-4">
              <div className="mb-6">
                <div className="flex items-center justify-between px-2 mb-3">
                  <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Projet Actuel</h3>
                  <button onClick={handleCreateProject} className="text-[#003B5C] hover:bg-[#eef8fb] p-1 rounded" title="Nouveau projet"><Plus size={16} /></button>
                </div>
                <select className="w-full bg-slate-100 rounded-lg p-2.5 text-sm font-medium outline-none focus:ring-2 focus:ring-[#003B5C] mb-2" value={currentProjectId || ''} onChange={(e) => { setCurrentProjectId(e.target.value); setCurrentPlanId(plans.find(p => p.projectId === e.target.value)?.id || null); setSelectedReserveId(null); }}>
                  {projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
                {currentProject && (
                  <button onClick={() => setIsLotModalOpen(true)} className="w-full flex items-center justify-center gap-2 text-xs font-medium text-slate-600 bg-slate-50 border border-slate-200 py-1.5 rounded-md hover:bg-slate-100 transition-colors">
                    <Settings size={14}/> Gérer les lots du projet
                  </button>
                )}
              </div>

              <div className="mb-6">
                <div className="flex items-center justify-between px-2 mb-3">
                  <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Plans du projet</h3>
                  <label className={`cursor-pointer text-[#003B5C] hover:bg-[#eef8fb] p-1 rounded ${isUploadingPlan || !currentProject ? 'opacity-50 pointer-events-none' : ''}`} title="Ajouter un plan">
                    {isUploadingPlan ? <Loader2 size={16} className="animate-spin" /> : <Upload size={16} />}
                    <input type="file" accept="image/*,application/pdf" className="hidden" onChange={handlePlanUpload} disabled={isUploadingPlan || !currentProject} />
                  </label>
                </div>
                <div className="space-y-1">
                  {projectPlans.map(plan => (
                    <button key={plan.id} onClick={() => { setCurrentPlanId(plan.id); setViewMode('plan'); setIsSidebarOpen(false); setSelectedReserveId(null); }} className={`w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3 ${currentPlanId === plan.id ? 'bg-[#eef8fb] text-[#003B5C] font-medium' : 'hover:bg-slate-100'}`}>
                      <Map size={18} className={currentPlanId === plan.id ? 'text-[#4CBBE4]' : 'text-slate-400'} /><span className="truncate">{plan.name}</span>
                    </button>
                  ))}
                  {projectPlans.length === 0 && <p className="text-xs text-slate-400 px-2 italic">Aucun plan.</p>}
                </div>
              </div>
            </div>

            <div className="p-4 border-t border-slate-200">
              <div className="flex items-center gap-3 px-2 py-2">
                <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 overflow-hidden">
                  {user?.photoURL ? <img src={user.photoURL} alt="Profil" /> : <User size={16} />}
                </div>
                <div className="text-sm overflow-hidden">
                  <p className="font-medium truncate">{user?.displayName || "Utilisateur"}</p>
                  <button onClick={handleLogout} className="text-xs text-red-500 hover:underline">Déconnexion</button>
                </div>
              </div>
            </div>
          </aside>

          {/* ZONE PRINCIPALE */}
          <main className="flex-1 flex flex-col min-w-0 relative">
            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 z-10 shadow-sm">
              <div className="flex items-center gap-4">
                <button className="md:hidden text-slate-500 p-1" onClick={() => setIsSidebarOpen(true)}><Menu size={24} /></button>
                <div>
                  <h2 className="text-lg font-bold leading-tight">{currentPlan ? currentPlan.name : 'Aucun plan'}</h2>
                  <p className="text-xs text-slate-500">{currentProject?.name}</p>
                </div>
              </div>

              {currentPlan && (
                <div className="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
                  <button onClick={() => setViewMode('plan')} className={`flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium ${viewMode === 'plan' ? 'bg-white text-[#003B5C] shadow-sm' : 'text-slate-500'}`}><Map size={16} /> Plan</button>
                  <button onClick={() => setViewMode('list')} className={`flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium ${viewMode === 'list' ? 'bg-white text-[#003B5C] shadow-sm' : 'text-slate-500'}`}><List size={16} /> Liste</button>
                </div>
              )}

              <button onClick={handleExportPDF} disabled={!currentPlan || isExporting} className={`hidden sm:flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${currentPlan && !isExporting ? 'bg-[#003B5C] hover:bg-[#002a42] text-white' : 'bg-slate-200 text-slate-400'}`}>
                {isExporting ? <Loader2 size={16} className="animate-spin" /> : <FileText size={16} />} 
                {isExporting ? 'Génération...' : 'Exporter PDF'}
              </button>
            </header>

            <div className="flex-1 overflow-hidden relative flex bg-slate-100">
              
              {/* VUE PLAN */}
              {viewMode === 'plan' && (
                <div 
                  ref={scrollContainerRef}
                  className={`flex-1 overflow-auto p-4 flex ${zoomLevel === 1 ? 'items-center justify-center' : 'items-start justify-start'} bg-slate-100 relative`}
                  style={{ touchAction: 'none' }}
                  onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerCancel={handlePointerUp} onPointerLeave={handlePointerUp}
                >
                  {/* Outils de Zoom */}
                  {currentPlan && (
                    <div className="fixed sm:absolute bottom-6 right-6 z-20 flex flex-col bg-white rounded-lg shadow-xl border border-slate-200 overflow-hidden" onPointerDown={e => e.stopPropagation()}>
                      <button onClick={() => setZoomLevel(z => Math.min(z * 1.5, 20))} className="p-3 hover:bg-slate-50 text-slate-700 transition-colors" title="Zoomer"><ZoomIn size={20} /></button>
                      <div className="h-px bg-slate-200 w-full"></div>
                      <button onClick={() => setZoomLevel(z => Math.max(z / 1.5, 0.5))} className="p-3 hover:bg-slate-50 text-slate-700 transition-colors" title="Dézoomer"><ZoomOut size={20} /></button>
                      <div className="h-px bg-slate-200 w-full"></div>
                      <button onClick={() => setZoomLevel(1)} className="p-3 hover:bg-slate-50 text-[#003B5C] font-bold text-xs transition-colors" title="Taille d'origine">1x</button>
                    </div>
                  )}

                  {currentPlan ? (
                    <div 
                      className="relative shadow-xl bg-white border border-slate-200 cursor-crosshair inline-block origin-top-left" 
                      onClick={handleAddPin}
                      style={{ width: zoomLevel === 1 ? 'auto' : `${zoomLevel * 100}%` }}
                    >
                      <img src={currentPlan.imageUrl} alt="Plan" className="block pointer-events-none" draggable="false" style={{ maxHeight: zoomLevel === 1 ? '80vh' : 'none', maxWidth: zoomLevel === 1 ? '100%' : 'none', width: zoomLevel !== 1 ? '100%' : 'auto', height: 'auto' }} />
                      {currentPlanReserves.map((reserve, index) => {
                        const isSelected = selectedReserveId === reserve.id;
                        return (
                          <div key={reserve.id} onClick={(e) => { e.stopPropagation(); setSelectedReserveId(reserve.id); }}
                            className={`reserve-pin absolute w-8 h-8 -ml-4 -mt-4 rounded-full border-2 cursor-pointer flex items-center justify-center text-white font-bold shadow-md transition-transform ${STATUS[reserve.status].color} ${isSelected ? 'border-white scale-125 z-20 ring-4 ring-[#4CBBE4]' : 'border-white hover:scale-110 z-10'}`}
                            style={{ left: `${reserve.x}%`, top: `${reserve.y}%` }}
                          >{index + 1}</div>
                        );
                      })}
                    </div>
                  ) : <p className="text-slate-500 m-auto">Sélectionnez ou créez un projet.</p>}
                </div>
              )}

              {/* VUE LISTE */}
              {viewMode === 'list' && currentPlan && (
                <div className="flex-1 overflow-auto p-6 bg-white"><div className="max-w-5xl mx-auto">
                  <div className="flex gap-4 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <Filter size={18} className="text-slate-500 mt-2" />
                    <select className="border border-slate-300 rounded-md p-2 text-sm" value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}>
                      <option value="">Tous les statuts</option>{Object.values(STATUS).map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                    </select>
                    <select className="border border-slate-300 rounded-md p-2 text-sm" value={filterLot} onChange={(e) => setFilterLot(e.target.value)}>
                      <option value="">Tous les lots</option>{currentProject?.lots?.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
                    </select>
                  </div>
                  <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
                    <table className="w-full text-left text-sm whitespace-nowrap">
                      <thead className="bg-slate-50 border-b border-slate-200 text-slate-500">
                        <tr><th className="px-4 py-3">N°</th><th className="px-4 py-3">Statut</th><th className="px-4 py-3">Lot</th><th className="px-4 py-3 w-full">Description</th></tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {currentPlanReserves.filter(r => (filterStatus ? r.status===filterStatus : true) && (filterLot ? r.lotId===filterLot : true)).map((r, i) => (
                          <tr key={r.id} className="hover:bg-slate-50 cursor-pointer" onClick={() => { setSelectedReserveId(r.id); setViewMode('plan'); }}>
                            <td className="px-4 py-3 font-bold">#{i + 1}</td>
                            <td className="px-4 py-3"><span className={`px-2 py-1 rounded-full text-xs text-white ${STATUS[r.status].color}`}>{STATUS[r.status].label}</span></td>
                            <td className="px-4 py-3 font-medium">{getLotName(r.lotId)}</td>
                            <td className="px-4 py-3 truncate max-w-xs">{r.description || '-'}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div></div>
              )}

              {/* FICHE RÉSERVE (PANNEAU DROIT) */}
              {selectedReserve && (
                <div className="absolute inset-y-0 right-0 w-full sm:w-96 bg-white shadow-2xl border-l border-slate-200 z-30 flex flex-col">
                  <div className="flex justify-between items-center p-4 border-b bg-slate-50">
                    <h3 className="font-bold text-lg">Réserve #{currentPlanReserves.findIndex(r => r.id === selectedReserve.id) + 1}</h3>
                    <button onClick={() => setSelectedReserveId(null)} className="p-1 hover:bg-slate-200 rounded-full"><X size={20} /></button>
                  </div>
                  <div className="flex-1 overflow-y-auto p-5 space-y-5">
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-2">Statut</label>
                      <div className="grid grid-cols-3 gap-2">
                        {Object.values(STATUS).map(s => {
                          const Icon = s.icon;
                          return (
                            <button key={s.id} onClick={() => handleUpdateReserve(selectedReserve.id, { status: s.id })} className={`flex flex-col items-center p-2 rounded-lg border-2 ${selectedReserve.status === s.id ? `${s.color.replace('bg-','border-')} bg-slate-50` : 'border-slate-100'}`}>
                              <Icon size={18} className={selectedReserve.status === s.id ? s.color.replace('bg-','text-') : 'text-slate-400'} />
                              <span className="text-[10px] font-bold mt-1">{s.label}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                    <div className="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                      <select 
                        value={selectedReserve.lotId} 
                        onChange={(e) => handleUpdateReserve(selectedReserve.id, { lotId: e.target.value })} 
                        className="w-full border rounded-md p-2 text-sm"
                      >
                        <option value="">Sélectionner un lot...</option>
                        {currentProject?.lots?.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
                      </select>
                      <input type="text" readOnly value={getLotEntreprise(selectedReserve.lotId)} placeholder="Entreprise liée au lot..." className="w-full border rounded-md p-2 text-sm bg-slate-100 text-slate-500" />
                    </div>
                    <textarea rows={3} placeholder="Description..." value={selectedReserve.description} onChange={(e) => handleUpdateReserve(selectedReserve.id, { description: e.target.value })} className="w-full border rounded-md p-3 text-sm" />
                    
                    {/* Section Photo & Dessin */}
                    <div>
                      <label className="block text-xs font-semibold text-slate-500 uppercase mb-2">Photo</label>
                      {selectedReserve.photoUrl ? (
                        <div className="relative group rounded-lg overflow-hidden border">
                          <img src={selectedReserve.photoUrl} alt="Défaut" className="w-full h-48 object-cover" />
                          <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center gap-4 transition-opacity">
                            <button onClick={() => setEditingPhotoUrl(selectedReserve.photoUrl)} className="bg-[#003B5C] text-white p-3 rounded-full hover:bg-[#002a42] shadow-lg" title="Annoter / Dessiner"><PenTool size={20} /></button>
                            <button onClick={() => handleUpdateReserve(selectedReserve.id, { photoUrl: null })} className="bg-red-500 text-white p-3 rounded-full hover:bg-red-600 shadow-lg" title="Supprimer"><Trash2 size={20} /></button>
                          </div>
                        </div>
                      ) : (
                        <label className="flex flex-col items-center justify-center h-24 border-2 border-dashed rounded-lg bg-slate-50 hover:bg-slate-100 cursor-pointer text-slate-500">
                          <Camera size={24} className="mb-1" /><span className="text-xs">Ajouter une photo</span>
                          <input type="file" accept="image/*" className="hidden" onChange={async (e) => { const f=e.target.files[0]; if(f){ const compressedUrl = await compressImageFile(f, 1500, 0.6); handleUpdateReserve(selectedReserve.id, {photoUrl: compressedUrl}); } }} />
                        </label>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>

          {/* =========================================
              CONTENEUR CACHÉ POUR L'EXPORT PDF
              ========================================= */}
          <div id="pdf-export-container" className="bg-white text-black" style={{ display: 'none', width: '210mm', padding: '20mm', boxSizing: 'border-box' }}>
            <div className="border-b-2 border-[#003B5C] pb-4 mb-6 flex justify-between items-end">
              <div>
                <img src={LOGO_ACCEO} alt="ACCEO Environnement" className="h-12 object-contain mb-4" />
                <h1 className="text-3xl font-black uppercase text-[#003B5C]">RAPPORT DE RÉSERVES</h1>
                <h2 className="text-xl font-medium text-slate-600 mt-1">{currentProject?.name}</h2>
                <p className="text-sm font-bold mt-2">Plan : {currentPlan?.name}</p>
              </div>
              <div className="text-right text-sm">
                <p><strong>Généré le :</strong> {new Date().toLocaleDateString('fr-FR')}</p>
                <div className="mt-2 flex gap-3 text-xs font-bold">
                  <span className="text-red-600">Ouv. : {currentPlanReserves.filter(r=>r.status==='OPEN').length}</span>
                  <span className="text-orange-600">En cours : {currentPlanReserves.filter(r=>r.status==='IN_PROGRESS').length}</span>
                  <span className="text-green-600">Levé : {currentPlanReserves.filter(r=>r.status==='RESOLVED').length}</span>
                </div>
              </div>
            </div>

            {currentPlan && (
              <div className="mb-10 text-center relative mx-auto inline-block border border-slate-300">
                <img src={currentPlan.imageUrl} alt="Plan" className="max-w-full" style={{ maxHeight: '160mm' }} />
                {currentPlanReserves.map((reserve, index) => (
                  <div key={reserve.id} className={`absolute w-6 h-6 -ml-3 -mt-3 rounded-full border border-black flex items-center justify-center text-white text-[10px] font-bold ${STATUS[reserve.status].color}`} style={{ left: `${reserve.x}%`, top: `${reserve.y}%` }}>
                    {index + 1}
                  </div>
                ))}
              </div>
            )}
            <div className="html2pdf__page-break"></div>

            <h3 className="text-lg font-bold mb-4 border-b border-slate-300 pb-2">Détails des interventions</h3>
            <table className="w-full text-left text-[12px] border-collapse">
              <thead>
                <tr className="bg-slate-100 border border-slate-800">
                  <th className="p-2 w-8 text-center border-r border-slate-800">N°</th>
                  <th className="p-2 w-20 border-r border-slate-800">Statut</th>
                  <th className="p-2 w-40 border-r border-slate-800">Lot / Entreprise</th>
                  <th className="p-2 border-r border-slate-800">Description</th>
                  <th className="p-2 w-28 text-center">Photo annotée</th>
                </tr>
              </thead>
              <tbody>
                {currentPlanReserves.map((r, i) => (
                  <tr key={r.id} className="border border-slate-400">
                    <td className="p-2 text-center font-bold border-r border-slate-400">{i + 1}</td>
                    <td className="p-2 font-bold uppercase text-[10px] border-r border-slate-400" style={{ color: STATUS[r.status].color.replace('bg-','') }}>{STATUS[r.status].label}</td>
                    <td className="p-2 border-r border-slate-400"><strong>{getLotName(r.lotId)}</strong><br/>{getLotEntreprise(r.lotId)}</td>
                    <td className="p-2 border-r border-slate-400 whitespace-pre-wrap">{r.description}</td>
                    <td className="p-2 text-center h-20">
                      {r.photoUrl ? <img src={r.photoUrl} alt="Défaut" className="max-h-16 max-w-full object-contain mx-auto" /> : '-'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
